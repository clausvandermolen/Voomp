<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>My Voomp</title>
    <meta name="description" content="My Voomp — encuentra y publica estacionamientos por hora, día o mes." />
    <!-- Phase 4: Preload critical resources for performance optimization -->
    <link rel="preload" as="script" href="/src/main.jsx" />
    <!-- Preload Google Maps API if needed (uncomment and set your API key) -->
    <!-- <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script> -->
    <style>
      html, body { margin: 0; padding: 0; overflow-x: hidden; max-width: 100vw; width: 100%; }
      #root { overflow-x: hidden; max-width: 100vw; width: 100%; }
      *, *::before, *::after { box-sizing: border-box; }
      img, video { max-width: 100%; height: auto; }
      @media (max-width: 767px) {
        body { font-size: 14px; }
        table { display: block; overflow-x: auto; max-width: 100%; }

        /* Reduce large container paddings */
        [style*="padding: 24px 24px"] { padding: 16px 12px !important; }
        [style*="padding: 20px 24px"] { padding: 16px 14px !important; }
        [style*="padding: 0 24px"] { padding: 0 12px !important; }
        [style*="padding: 14px 24px"] { padding: 14px 12px !important; }
        [style*="padding: 0 24px 80px"] { padding: 0 12px 80px !important; }
        [style*="padding: 24px 24px 80px"] { padding: 16px 12px 80px !important; }

        /* Collapse multi-column grids to single column */
        [style*="grid-template-columns: 1fr 380px"],
        [style*="grid-template-columns: 1fr 400px"],
        [style*="grid-template-columns: 1fr 340px"],
        [style*="grid-template-columns: 2fr 1fr"],
        [style*="grid-template-columns: 1fr 2fr"],
        [style*="grid-template-columns: 260px 1fr"],
        [style*="grid-template-columns: 280px 1fr"],
        [style*="grid-template-columns: 300px 1fr"],
        [style*="grid-template-columns: 320px 1fr"],
        [style*="grid-template-columns: repeat(2,"],
        [style*="grid-template-columns: repeat(3,"],
        [style*="grid-template-columns: repeat(4,"],
        [style*="grid-template-columns: 1fr 1fr 1fr 1fr"],
        [style*="grid-template-columns: 1fr 1fr 1fr"] {
          grid-template-columns: 1fr !important;
        }

        /* Two-equal columns stay as 1fr 1fr but ensure min-width safety */
        [style*="grid-template-columns: 1fr 1fr"] {
          min-width: 0;
        }

        /* Gallery grid (hero photos) should also collapse */
        [style*="max-height: 420"] [style*="grid-template-columns: 1fr 1fr"] {
          grid-template-columns: 1fr !important;
        }

        /* Cap big max-widths to viewport */
        [style*="max-width: 1760"],
        [style*="max-width: 1120"],
        [style*="max-width: 960"],
        [style*="max-width: 880"],
        [style*="max-width: 720"],
        [style*="max-width: 640"] {
          max-width: 100% !important;
        }

        /* Flexbox rows that are too wide should wrap */
        [style*="display: flex"][style*="gap: 48"],
        [style*="display: flex"][style*="gap: 40"],
        [style*="display: flex"][style*="gap: 32"] {
          flex-wrap: wrap !important;
          gap: 16px !important;
        }

        /* Reduce large gaps */
        [style*="gap: 48"] { gap: 20px !important; }
        [style*="gap: 40"] { gap: 18px !important; }
        [style*="gap: 32"] { gap: 16px !important; }

        /* Reduce huge margin-top */
        [style*="margin-top: 32"] { margin-top: 20px !important; }

        /* Font sizes for huge headings */
        h1[style*="font-size: 26"] { font-size: 22px !important; }
        h1[style*="font-size: 28"] { font-size: 22px !important; }
        h1[style*="font-size: 32"] { font-size: 24px !important; }

        /* Sticky booking sidebars should not be sticky on mobile */
        [style*="position: sticky"][style*="top: 120"],
        [style*="position: sticky"][style*="top: 140"],
        [style*="position: sticky"][style*="top: 100"] {
          position: static !important;
        }

        /* Modals should fit viewport */
        [style*="width: 600"], [style*="width: 700"], [style*="width: 800"], [style*="width: 900"] {
          width: 100% !important;
          max-width: 100% !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
